name: OrangeFox Builder - NX733J

on:
  workflow_dispatch:
    inputs:
      OFRP_MANIFEST_URL:
        description: "OrangeFox manifest url"
        required: true
        default: "https://gitlab.com/OrangeFox/platform_manifest"
      OFRP_MANIFEST_BRANCH:
        description: "OrangeFox branch"
        required: true
        default: "fox_12.1"
      DEVICE_TREE_URL:
        description: "Device tree url"
        required: true
        default: "https://github.com/DrakiSama/orangeFox_device_nubia_nx733j"
      DEVICE_TREE_BRANCH:
        description: "Device tree branch"
        required: true
        default: "main"
      DEVICE_PATH:
        description: "Device path device/"
        required: true
        default: "nubia/NX733J"
      DEVICE_NAME:
        description: "Device name"
        required: true
        default: "NX733J"
      BUILD_PARTITION:
        description: "Build partition (recovery or boot)"
        required: true
        default: "recovery"

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write
    env:
      BUILD_DIR: ~/orangefox
      CCACHE_DIR: ~/.ccache
      CCACHE_MAXSIZE: 10G

    steps:
    - name: Show build info
      run: |
        echo "BUILD_DATE=$(date +%F)" >> "$GITHUB_ENV"
        echo "LUNCH_TARGET=${{ github.event.inputs.DEVICE_NAME }}" >> "$GITHUB_ENV"
        cat <<EOF
        ========================================
        OrangeFox Recovery Build
        ========================================
        Manifest:    ${{ github.event.inputs.OFRP_MANIFEST_URL }} (${{ github.event.inputs.OFRP_MANIFEST_BRANCH }})
        Device tree: ${{ github.event.inputs.DEVICE_TREE_URL }} (${{ github.event.inputs.DEVICE_TREE_BRANCH }})
        Device:      ${{ github.event.inputs.DEVICE_NAME }}
        Path:        device/${{ github.event.inputs.DEVICE_PATH }}
        Target:      ${{ github.event.inputs.BUILD_PARTITION }}.img
        Date:        $(date)
        ========================================
        EOF

    - name: Maximize build space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /usr/local/share/boost /usr/lib/jvm /usr/local/lib/heroku
        sudo rm -rf /opt/hostedtoolcache
        df -h /

    - name: Setup ccache
      run: |
        mkdir -p "${{ env.CCACHE_DIR }}"
        ccache --set-config=cache_dir="${{ env.CCACHE_DIR }}"
        ccache --set-config=max_size="${{ env.CCACHE_MAXSIZE }}"
        ccache --set-config=compression=true
        echo "USE_CCACHE=1" >> "$GITHUB_ENV"

    - name: Setup swap file
      run: |
        sudo swapoff -a 2>/dev/null || true
        sudo rm -f /swapfile 2>/dev/null || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile -p 1000
        swapon --show
        free -h

    - name: Git config
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"

    - name: Sync OrangeFox source
      run: |
        if [ ! -f "${{ env.BUILD_DIR }}/build/envsetup.sh" ]; then
          repo init -u ${{ github.event.inputs.OFRP_MANIFEST_URL }} \
                    -b ${{ github.event.inputs.OFRP_MANIFEST_BRANCH }} \
                    --depth=1
          repo sync -c --no-tags --optimized-fetch --prune -j$(nproc)
        else
          echo "Source already synced, skipping..."
        fi
      working-directory: ${{ env.BUILD_DIR }}

    - name: Clean stale artifacts
      run: |
        rm -rf out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery/root/etc
      working-directory: ${{ env.BUILD_DIR }}

    - name: Clone device tree
      run: |
        rm -rf device/${{ github.event.inputs.DEVICE_PATH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} \
                  -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} \
                  device/${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ env.BUILD_DIR }}

    - name: Inject commit hash
      run: |
        HASH=$(git rev-parse --short HEAD)
        sed -i "s/TW_DEVICE_VERSION := by Draki/TW_DEVICE_VERSION := by Draki ($HASH)/" BoardConfig.mk
        echo "TW_DEVICE_VERSION: $(grep 'TW_DEVICE_VERSION' BoardConfig.mk)"
      working-directory: ${{ env.BUILD_DIR }}/device/${{ github.event.inputs.DEVICE_PATH }}

    - name: Generate changelog
      run: |
        {
          echo "OrangeFox R12.1 - ${{ github.event.inputs.DEVICE_NAME }}"
          echo "Build date: $(date)"
          echo "Manifest: ${{ github.event.inputs.OFRP_MANIFEST_URL }} (${{ github.event.inputs.OFRP_MANIFEST_BRANCH }})"
          echo ""
          echo "Changelog:"
          set +e
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
          if [ $? -eq 0 ]; then
            git log "$LAST_TAG"..HEAD --pretty=format:"- %h: %s"
          else
            git log --pretty=format:"- %h: %s"
          fi
        } > INFO.txt
        cat INFO.txt
      working-directory: ${{ env.BUILD_DIR }}/device/${{ github.event.inputs.DEVICE_PATH }}

    - name: Build OrangeFox Recovery
      run: |
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        lunch ofrp_${{ env.LUNCH_TARGET }}
        make ${{ github.event.inputs.BUILD_PARTITION }}image -j$(nproc) 2>&1 | tail -100
      working-directory: ${{ env.BUILD_DIR }}

    - name: Prepare artifacts
      run: |
        ARTIFACT="OrangeFox-R12.1-${{ github.event.inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}.img"
        cp out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_PARTITION }}.img \
           "$ARTIFACT"
        echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"
        ls -lh "$ARTIFACT"
      working-directory: ${{ env.BUILD_DIR }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.BUILD_DIR }}/${{ env.ARTIFACT }}
          ${{ env.BUILD_DIR }}/device/${{ github.event.inputs.DEVICE_PATH }}/INFO.txt
        name: OrangeFox-R12.1-${{ github.event.inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}
        tag_name: v${{ env.BUILD_DATE }}-${{ github.run_id }}
        body_path: ${{ env.BUILD_DIR }}/device/${{ github.event.inputs.DEVICE_PATH }}/INFO.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
