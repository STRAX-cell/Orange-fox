name: OrangeFox Builder - NX733J

on:
  workflow_dispatch:
    inputs:
      OFRP_MANIFEST_URL:
        description: "OrangeFox manifest url"
        required: true
        default: "https://gitlab.com/OrangeFox/platform_manifest"
      OFRP_MANIFEST_BRANCH:
        description: "OrangeFox branch"
        required: true
        default: "fox_12.1"
      DEVICE_TREE_URL:
        description: "Device tree url"
        required: true
        default: "https://github.com/DrakiSama/ofrp_device_nubia_nx733j"
      DEVICE_TREE_BRANCH:
        description: "Device tree branch"
        required: true
        default: "fox_12.1"
      DEVICE_PATH:
        description: "Device path device/"
        required: true
        default: "nubia/NX733J"
      DEVICE_NAME:
        description: "Device name"
        required: true
        default: "NX733J"
      LUNCH_TARGET:
        description: "lunch ofrp_ (default same as device name)"
        required: false
        default: ""
      BUILD_PARTITION:
        description: "Build partition"
        required: true
        default: "recovery"

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
    - name: Show build info
      run: |
        if [ -n "${{ github.event.inputs.LUNCH_TARGET }}" ]; then
          echo "LUNCH_TARGET=${{ github.event.inputs.LUNCH_TARGET }}" >> "$GITHUB_ENV"
        else
          echo "LUNCH_TARGET=${{ github.event.inputs.DEVICE_NAME }}" >> "$GITHUB_ENV"
        fi
        {
          echo 'BUILD_INFO<<EOF'
          echo
          echo Manifest url: ${{ github.event.inputs.OFRP_MANIFEST_URL }}
          echo Manifest branch: ${{ github.event.inputs.OFRP_MANIFEST_BRANCH }}
          echo Device tree url: ${{ github.event.inputs.DEVICE_TREE_URL }}
          echo Device tree branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}
          echo Device path: ${{ github.event.inputs.DEVICE_PATH }}
          echo Device name: ${{ github.event.inputs.DEVICE_NAME }}
          echo Lunch target: ${{ github.event.inputs.LUNCH_TARGET }}
          echo Build target: ${{ github.event.inputs.BUILD_PARTITION }}.img
          echo Build date: `date`
          echo
          echo EOF
        } >> "$GITHUB_ENV"
        echo BUILD_DATE=`date +%F` >> "$GITHUB_ENV"

    - name: Maximize build space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/lib/jvm
        sudo rm -rf /usr/local/lib/heroku
        sudo rm -rf /opt/hostedtoolcache
        df -h

    - name: Setup ccache
      run: |
        export CCACHE_DIR=~/.ccache
        export CCACHE_MAXSIZE=10G
        export USE_CCACHE=1
        mkdir -p ~/.ccache
        ccache --set-config=cache_dir=~/.ccache
        ccache --set-config=max_size=10G
        ccache --set-config=compression=true
        echo "CCACHE_DIR=~/.ccache" >> "$GITHUB_ENV"
        echo "CCACHE_MAXSIZE=10G" >> "$GITHUB_ENV"
        echo "USE_CCACHE=1" >> "$GITHUB_ENV"

    - name: Setup swap file
      run: |
        sudo swapoff -a 2>/dev/null || true
        sudo rm -f /swapfile 2>/dev/null || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile -p 1000
        swapon --show
        free -h

    - name: Setup environment
      run: |
        git config --global user.name ${{ github.actor }}
        git config --global user.email ${{ github.actor }}@users.noreply.github.com

    - name: Sync source
      run: |
        cd ~/orangefox
        if [ ! -f build/envsetup.sh ]; then
          repo init -u ${{ github.event.inputs.OFRP_MANIFEST_URL }} -b ${{ github.event.inputs.OFRP_MANIFEST_BRANCH }} --depth=1
          repo sync -c --no-tags --optimized-fetch --prune -j$(nproc)
        else
          echo "Source already synced, skipping..."
        fi

    - name: Clean stale artifacts
      run: |
        rm -rf ~/orangefox/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/recovery/root/etc
        echo "Cleaned stale recovery/root/etc"

    - name: Setup device
      run: |
        rm -rf ~/orangefox/device/${{ github.event.inputs.DEVICE_PATH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ~/orangefox/device/${{ github.event.inputs.DEVICE_PATH }}

    - name: Inject commit hash into branding
      run: |
        cd ~/orangefox/device/${{ github.event.inputs.DEVICE_PATH }}
        HASH=$(git rev-parse --short HEAD)
        sed -i "s/TW_DEVICE_VERSION := by Draki/TW_DEVICE_VERSION := by Draki ($HASH)/" BoardConfig.mk
        echo "TW_DEVICE_VERSION=$(grep 'TW_DEVICE_VERSION' BoardConfig.mk)"

    - name: Generate build info
      run: |
        echo -e "$BUILD_INFO" >> INFO.txt
        echo "Change log:" >> INFO.txt
        set +e
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        if [ $? -eq 0 ]; then
          git log "$LAST_TAG"..HEAD --pretty=format:"- %h-%an: %s" >> INFO.txt
        else
          git log --pretty=format:"- %h-%an: %s" >> INFO.txt
        fi
        cat INFO.txt
      working-directory: /home/draki/orangefox/device/${{ github.event.inputs.DEVICE_PATH }}

    - name: Build OrangeFox
      run: |
        cd ~/orangefox
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache
        export CCACHE_MAXSIZE=10G
        lunch ofrp_${{ env.LUNCH_TARGET }}
        m ${{ github.event.inputs.BUILD_PARTITION }}image -j$(nproc)
        mv out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_PARTITION }}.img ~/orangefox/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox-R12.1-${{ github.event.inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}.img

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          /home/draki/orangefox/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox-R12.1-${{ github.event.inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}.img
        name: OrangeFox-R12.1-${{ github.event.inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}-${{ github.run_id }}
        tag_name: ${{ env.BUILD_DATE }}-${{ github.run_id }}
        body_path: /home/draki/orangefox/device/${{ github.event.inputs.DEVICE_PATH }}/INFO.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
